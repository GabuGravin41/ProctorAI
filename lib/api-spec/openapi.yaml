openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: ProctorAI - Online proctored exam platform
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: exams
    description: Exam management
  - name: questions
    description: Question management
  - name: sessions
    description: Exam sessions
  - name: flags
    description: Cheating flag incidents
  - name: users
    description: User management

paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  # ── Exam CRUD ────────────────────────────────────────────────────────────────
  /exams:
    get:
      operationId: listExams
      tags: [exams]
      summary: List all exams for the current instructor
      parameters:
        - name: status
          in: query
          schema:
            type: string
            enum: [draft, published, archived]
      responses:
        "200":
          description: List of exams
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Exam"
    post:
      operationId: createExam
      tags: [exams]
      summary: Create a new exam
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ExamInput"
      responses:
        "201":
          description: Created exam
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Exam"

  /exams/{examId}:
    get:
      operationId: getExam
      tags: [exams]
      summary: Get exam by ID
      parameters:
        - name: examId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Exam
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ExamWithQuestions"
        "404":
          description: Not found
    patch:
      operationId: updateExam
      tags: [exams]
      summary: Update exam
      parameters:
        - name: examId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ExamUpdate"
      responses:
        "200":
          description: Updated exam
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Exam"
    delete:
      operationId: deleteExam
      tags: [exams]
      summary: Delete exam
      parameters:
        - name: examId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /exams/{examId}/publish:
    post:
      operationId: publishExam
      tags: [exams]
      summary: Publish exam and generate access codes for students
      parameters:
        - name: examId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PublishExamInput"
      responses:
        "200":
          description: Published exam with access codes
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PublishResult"

  # ── Question CRUD ─────────────────────────────────────────────────────────────
  /exams/{examId}/questions:
    get:
      operationId: listQuestions
      tags: [questions]
      summary: List questions for an exam
      parameters:
        - name: examId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: List of questions
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Question"
    post:
      operationId: createQuestion
      tags: [questions]
      summary: Add question to an exam
      parameters:
        - name: examId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/QuestionInput"
      responses:
        "201":
          description: Created question
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Question"

  /exams/{examId}/questions/{questionId}:
    patch:
      operationId: updateQuestion
      tags: [questions]
      summary: Update a question
      parameters:
        - name: examId
          in: path
          required: true
          schema:
            type: integer
        - name: questionId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/QuestionUpdate"
      responses:
        "200":
          description: Updated question
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Question"
    delete:
      operationId: deleteQuestion
      tags: [questions]
      summary: Delete a question
      parameters:
        - name: examId
          in: path
          required: true
          schema:
            type: integer
        - name: questionId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /exams/{examId}/generate-questions:
    post:
      operationId: generateQuestions
      tags: [questions]
      summary: AI-generate questions for an exam
      parameters:
        - name: examId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/GenerateQuestionsInput"
      responses:
        "200":
          description: Generated questions
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Question"

  # ── Exam Sessions (student side) ─────────────────────────────────────────────
  /sessions:
    get:
      operationId: listSessions
      tags: [sessions]
      summary: List exam sessions (for instructor or student)
      parameters:
        - name: examId
          in: query
          schema:
            type: integer
        - name: studentClerkId
          in: query
          schema:
            type: string
      responses:
        "200":
          description: List of sessions
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/StudentSessionItem"

  /sessions/join:
    post:
      operationId: joinExam
      tags: [sessions]
      summary: Student joins an exam using access code
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/JoinExamInput"
      responses:
        "200":
          description: Session details with exam
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SessionWithExam"

  /sessions/{sessionId}:
    get:
      operationId: getSession
      tags: [sessions]
      summary: Get session details
      parameters:
        - name: sessionId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Session
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SessionWithExam"

  /sessions/{sessionId}/start:
    post:
      operationId: startSession
      tags: [sessions]
      summary: Start the exam session (camera/mic confirmed)
      parameters:
        - name: sessionId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Session started
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ExamSession"

  /sessions/{sessionId}/submit:
    post:
      operationId: submitSession
      tags: [sessions]
      summary: Student submits exam answers
      parameters:
        - name: sessionId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SubmitAnswersInput"
      responses:
        "200":
          description: Submission result with score
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SubmissionResult"

  # ── Cheating Flags ───────────────────────────────────────────────────────────
  /sessions/{sessionId}/flags:
    get:
      operationId: listSessionFlags
      tags: [flags]
      summary: List flags for a session
      parameters:
        - name: sessionId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Flags
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/CheatingFlag"
    post:
      operationId: reportFlag
      tags: [flags]
      summary: Report a cheating flag (from AI monitor)
      parameters:
        - name: sessionId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/FlagInput"
      responses:
        "201":
          description: Flag recorded
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CheatingFlag"

  /flags/{flagId}/review:
    patch:
      operationId: reviewFlag
      tags: [flags]
      summary: Instructor marks a flag as reviewed (dismissed or confirmed)
      parameters:
        - name: flagId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/FlagReviewInput"
      responses:
        "200":
          description: Updated flag
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CheatingFlag"

  # ── Dashboard / Analytics ───────────────────────────────────────────────────
  /dashboard/stats:
    get:
      operationId: getDashboardStats
      tags: [exams]
      summary: Instructor dashboard summary stats
      responses:
        "200":
          description: Stats
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DashboardStats"

  /exams/{examId}/results:
    get:
      operationId: getExamResults
      tags: [sessions]
      summary: Get all results and flag summary for an exam
      parameters:
        - name: examId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Exam results
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ExamResults"

  # ── User Profile ─────────────────────────────────────────────────────────────
  /users/me:
    get:
      operationId: getMe
      tags: [users]
      summary: Get current user profile (creates if first visit)
      responses:
        "200":
          description: User profile
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserProfile"
    patch:
      operationId: updateMe
      tags: [users]
      summary: Update current user role/profile
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UserProfileUpdate"
      responses:
        "200":
          description: Updated user profile
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserProfile"

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required: [status]

    AIConfig:
      type: object
      required: [provider, model]
      properties:
        provider:
          type: string
          enum: [free, custom_openrouter, custom_gemini, hosted]
        model:
          type: string
        customApiKey:
          type: string
        hostedPaid:
          type: boolean

    # ── User ──────────────────────────────────────────────────────────────────
    UserProfile:
      type: object
      required: [id, clerkId, email]
      properties:
        id:
          type: integer
        clerkId:
          type: string
        email:
          type: string
        name:
          type: ["string", "null"]
        role:
          type: ["string", "null"]
          enum: [instructor, student]
        institutionName:
          type: ["string", "null"]
        subjectArea:
          type: ["string", "null"]
        trafficSource:
          type: ["string", "null"]
        createdAt:
          type: string

    UserProfileUpdate:
      type: object
      properties:
        name:
          type: string
        role:
          type: string
          enum: [instructor, student]
        institutionName:
          type: string
        subjectArea:
          type: string
        trafficSource:
          type: string

    # ── Exam ──────────────────────────────────────────────────────────────────
    Exam:
      type: object
      required: [id, title, status, durationMinutes, instructorClerkId, createdAt]
      properties:
        id:
          type: integer
        title:
          type: string
        description:
          type: ["string", "null"]
        status:
          type: string
          enum: [draft, published, archived]
        durationMinutes:
          type: integer
        subject:
          type: ["string", "null"]
        instructorClerkId:
          type: string
        questionCount:
          type: integer
        sessionCount:
          type: integer
        flagCount:
          type: integer
        gradingMode:
          type: string
          enum: [manual, review_release, auto_release]
        aiConfig:
          $ref: "#/components/schemas/AIConfig"
        createdAt:
          type: string
        updatedAt:
          type: string

    ExamWithQuestions:
      type: object
      required: [id, title, status, durationMinutes, instructorClerkId, createdAt, questions]
      properties:
        id:
          type: integer
        title:
          type: string
        description:
          type: ["string", "null"]
        status:
          type: string
          enum: [draft, published, archived]
        durationMinutes:
          type: integer
        subject:
          type: ["string", "null"]
        instructorClerkId:
          type: string
        gradingMode:
          type: string
          enum: [manual, review_release, auto_release]
        aiConfig:
          $ref: "#/components/schemas/AIConfig"
        createdAt:
          type: string
        updatedAt:
          type: string
        questions:
          type: array
          items:
            $ref: "#/components/schemas/Question"

    ExamInput:
      type: object
      required: [title, durationMinutes]
      properties:
        title:
          type: string
          minLength: 1
        description:
          type: string
        subject:
          type: string
        durationMinutes:
          type: integer
          minimum: 5
        gradingMode:
          type: string
          enum: [manual, review_release, auto_release]
        aiConfig:
          $ref: "#/components/schemas/AIConfig"

    ExamUpdate:
      type: object
      properties:
        title:
          type: string
          minLength: 1
        description:
          type: string
        subject:
          type: string
        durationMinutes:
          type: integer
          minimum: 5
        gradingMode:
          type: string
          enum: [manual, review_release, auto_release]
        status:
          type: string
          enum: [draft, published, archived]
        aiConfig:
          $ref: "#/components/schemas/AIConfig"

    PublishExamInput:
      type: object
      required: [studentEmails]
      properties:
        studentEmails:
          type: array
          items:
            type: string

    PublishResult:
      type: object
      required: [exam, accessCodes]
      properties:
        exam:
          $ref: "#/components/schemas/Exam"
        accessCodes:
          type: array
          items:
            $ref: "#/components/schemas/AccessCode"

    AccessCode:
      type: object
      required: [code, studentEmail]
      properties:
        code:
          type: string
        studentEmail:
          type: string

    # ── Question ──────────────────────────────────────────────────────────────
    Question:
      type: object
      required: [id, examId, type, text, orderIndex]
      properties:
        id:
          type: integer
        examId:
          type: integer
        type:
          type: string
          enum: [multiple_choice, true_false, short_answer, essay]
        text:
          type: string
        options:
          type: ["array", "null"]
          items:
            type: string
        correctAnswer:
          type: ["string", "null"]
        referenceSolution:
          type: ["string", "null"]
        points:
          type: integer
        orderIndex:
          type: integer

    QuestionInput:
      type: object
      required: [type, text]
      properties:
        type:
          type: string
          enum: [multiple_choice, true_false, short_answer, essay]
        text:
          type: string
          minLength: 1
        options:
          type: array
          items:
            type: string
        correctAnswer:
          type: string
        referenceSolution:
          type: string
        points:
          type: integer

    QuestionUpdate:
      type: object
      properties:
        type:
          type: string
          enum: [multiple_choice, true_false, short_answer, essay]
        text:
          type: string
          minLength: 1
        options:
          type: array
          items:
            type: string
        correctAnswer:
          type: string
        referenceSolution:
          type: string
        points:
          type: integer
        orderIndex:
          type: integer

    GenerateQuestionsInput:
      type: object
      required: [topic, questionTypes, count]
      properties:
        topic:
          type: string
        questionTypes:
          type: array
          items:
            type: string
            enum: [multiple_choice, true_false, short_answer]
        count:
          type: integer
          minimum: 1
          maximum: 20
        difficulty:
          type: string
          enum: [easy, medium, hard]

    # ── Session ───────────────────────────────────────────────────────────────
    ExamSession:
      type: object
      required: [id, examId, studentClerkId, status, createdAt]
      properties:
        id:
          type: integer
        examId:
          type: integer
        studentClerkId:
          type: string
        studentEmail:
          type: ["string", "null"]
        studentName:
          type: ["string", "null"]
        accessCode:
          type: string
        status:
          type: string
          enum: [pending, active, submitted, expired]
        score:
          type: ["number", "null"]
        maxScore:
          type: ["integer", "null"]
        flagCount:
          type: integer
        startedAt:
          type: ["string", "null"]
        submittedAt:
          type: ["string", "null"]
        createdAt:
          type: string

    SessionWithExam:
      type: object
      required: [session, exam]
      properties:
        session:
          $ref: "#/components/schemas/ExamSession"
        exam:
          $ref: "#/components/schemas/ExamWithQuestions"
        answers:
          type: array
          items:
            $ref: "#/components/schemas/AnswerResult"

    ExamSummary:
      type: object
      required: [id, title, durationMinutes, status]
      properties:
        id:
          type: integer
        title:
          type: string
        subject:
          type: ["string", "null"]
        durationMinutes:
          type: integer
        status:
          type: string
          enum: [draft, published, archived]

    StudentSessionItem:
      type: object
      required: [session, exam]
      properties:
        session:
          $ref: "#/components/schemas/ExamSession"
        exam:
          $ref: "#/components/schemas/ExamSummary"

    JoinExamInput:
      type: object
      required: [accessCode]
      properties:
        accessCode:
          type: string

    SubmitAnswersInput:
      type: object
      required: [answers]
      properties:
        answers:
          type: array
          items:
            $ref: "#/components/schemas/AnswerInput"

    AnswerInput:
      type: object
      required: [questionId, answer]
      properties:
        questionId:
          type: integer
        answer:
          type: string
        attachments:
          type: array
          items:
            type: string

    SubmissionResult:
      type: object
      required: [session, score, maxScore, percentage]
      properties:
        session:
          $ref: "#/components/schemas/ExamSession"
        score:
          type: number
        maxScore:
          type: integer
        percentage:
          type: number
        answers:
          type: array
          items:
            $ref: "#/components/schemas/AnswerResult"

    AnswerResult:
      type: object
      required: [questionId, isCorrect, points]
      properties:
        questionId:
          type: integer
        answer:
          type: ["string", "null"]
        questionText:
          type: ["string", "null"]
        questionType:
          type: ["string", "null"]
        studentAnswer:
          type: ["string", "null"]
        isCorrect:
          type: boolean
        points:
          type: number
        maxPoints:
          type: ["integer", "null"]
        correctAnswer:
          type: ["string", "null"]
        options:
          type: ["array", "null"]
          items:
            type: string

    # ── Flag ──────────────────────────────────────────────────────────────────
    CheatingFlag:
      type: object
      required: [id, sessionId, type, detectedAt, reviewStatus]
      properties:
        id:
          type: integer
        sessionId:
          type: integer
        type:
          type: string
          enum: [face_not_visible, multiple_faces, looking_away, phone_detected, suspicious_movement, audio_anomaly, tab_switch, fullscreen_exit]
        description:
          type: ["string", "null"]
        clipData:
          type: ["string", "null"]
        detectedAt:
          type: string
        reviewStatus:
          type: string
          enum: [pending, dismissed, confirmed]
        reviewedAt:
          type: ["string", "null"]
        reviewNote:
          type: ["string", "null"]

    FlagInput:
      type: object
      required: [type, detectedAt]
      properties:
        type:
          type: string
          enum: [face_not_visible, multiple_faces, looking_away, phone_detected, suspicious_movement, audio_anomaly, tab_switch, fullscreen_exit]
        description:
          type: string
        clipData:
          type: string
        detectedAt:
          type: string

    FlagReviewInput:
      type: object
      required: [reviewStatus]
      properties:
        reviewStatus:
          type: string
          enum: [dismissed, confirmed]
        reviewNote:
          type: string

    # ── Dashboard ─────────────────────────────────────────────────────────────
    DashboardStats:
      type: object
      required: [totalExams, publishedExams, totalSessions, activeSessions, pendingFlags, avgScore]
      properties:
        totalExams:
          type: integer
        publishedExams:
          type: integer
        totalSessions:
          type: integer
        activeSessions:
          type: integer
        pendingFlags:
          type: integer
        avgScore:
          type: number
        recentExams:
          type: array
          items:
            $ref: "#/components/schemas/Exam"
        recentFlags:
          type: array
          items:
            $ref: "#/components/schemas/CheatingFlag"

    ExamResults:
      type: object
      required: [exam, sessions, totalFlags, avgScore, submittedCount]
      properties:
        exam:
          $ref: "#/components/schemas/Exam"
        sessions:
          type: array
          items:
            $ref: "#/components/schemas/ExamSession"
        totalFlags:
          type: integer
        avgScore:
          type: number
        submittedCount:
          type: integer
